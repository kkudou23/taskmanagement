{% extends "base.html" %}

{% block title %}タスク追加{% endblock %}
{% block h1 %}タスク追加{% endblock %}

{% block content %}
  <form method="post">
    {% csrf_token %}

    <table class="table table-striped my-4">
    {% for field in form %}
        {% if field.label != 'Status' %}
        <tr>
            <th class="py-3">{{ field.label_tag }}</th>
            <td class="py-3">{{ field }}</td>
        </tr>
        {% endif %}
    {% endfor %}
    </table>
    
    <div class="text-center">
        <button type="submit" class="btn btn-outline-success">作成する</button>
    </div>
  </form>
{% endblock %}
