<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
    <title>{% block title %}{% endblock %} | タスク管理</title>
    <style>
        body {
            font-family: "Noto Sans JP", serif;
        }
        pre {
            white-space: pre-wrap;
        }
        .btn-group a, .btn-clear-filter {
            {% comment %} task_listの絞り込み用ボタン {% endcomment %}
            padding: 10px;
        }

        {% comment %} task_createとtask_updateにて、widget tweaksを使用して、「checkbox」と「それ以外のinput」に大別できるfieldをそれぞれbootstrapで装飾しようとしたが、どちらか片方のクラスにすべて統一されてしまうため、bootstrapを使用せずにcssを記述する {% endcomment %}
        input[type=text], select, textarea {    
            display: block;
            width: 100%;
            padding: .375rem .75rem;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: var(--bs-body-color);
            background-color: var(--bs-body-bg);
            background-clip: padding-box;
            border: var(--bs-border-width) solid var(--bs-border-color);
            border-radius: var(--bs-border-radius);
        }
        input[type=checkbox] {
            transform: scale(2);
            accent-color: green;
            margin: 0 6px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-success sticky-top">
        <div class="navbar-nav d-flex flex-row">
            <a class="navbar-brand mx-3 fw-bold">タスク管理アプリ</a>
            {% if user.is_authenticated %}
                <a href="{% url 'list-task' %}" class="nav-link mx-2">タスク一覧</a>
                <a href="{% url 'create-task' %}" class="nav-link mx-2">タスク追加</a>
            {% endif %}
        </div>
        <div class="navbar-nav d-flex flex-row">
            {% if user.is_authenticated %}
                <span class="navbar-text text-light mx-2">{{ user }}でログイン中</span>
                <a href="{% url 'logout' %}" class="btn btn-danger mx-2">ログアウト</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-light mx-2">ログイン</a>
                <a href="{% url 'accounts:signup' %}" class="btn btn-dark mx-2">サインアップ</a>
            {% endif %}
        </div>
    </nav>
    <div class="p-4">
        <h1 class="text-center">{% block h1 %}{% endblock %}</h1>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
